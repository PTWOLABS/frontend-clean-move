services:
  web:
    build:
      context: .
      target: runner
    container_name: clean-move-web
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_BASE_URL=${NEXT_PUBLIC_API_BASE_URL:-http://host.docker.internal:3333}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/login'').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped

  e2e:
    image: cypress/included:15.14.2
    container_name: clean-move-e2e
    working_dir: /e2e
    entrypoint: ["sh", "-c"]
    depends_on:
      web:
        condition: service_healthy
    environment:
      - CI=true
      - CYPRESS_baseUrl=http://web:3000
    volumes:
      - ./:/e2e
      - cypress-cache:/root/.cache/Cypress
    command: ["npm ci && npm run cypress:run"]
    profiles:
      - e2e

volumes:
  cypress-cache:
